name: Build Mac App (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build unsigned DMG (Universal — Intel + Apple Silicon)
        working-directory: electron
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: WAVESCOUT-mac
          path: electron/dist/*.dmg
          retention-days: 90
