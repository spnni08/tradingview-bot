<body>

<script>if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
<!-- Inject X-Session-ID header into every API request so auth works when
     third-party cookies are blocked (Safari ITP, Chrome Partitioned Cookies). -->
<script>
(function(){
  var _WORKER='tradingview-bot.spnn08.workers.dev';
  var _orig=window.fetch;
  window.fetch=function(resource,init){
    var url=typeof resource==='string'?resource:(resource&&resource.url)||'';
    if(url.indexOf(_WORKER)!==-1){
      var sid=sessionStorage.getItem('wavescout_session');
      if(sid){
        init=init?Object.assign({},init):{};
        init.headers=Object.assign({'X-Session-ID':sid},init.headers||{});
      }
    }
    return _orig.call(this,resource,init);
  };
})();
</script>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Shell must load first (declares React hooks + shared components) -->

<!-- Router — must load last -->
<script type="text/babel" src="app.jsx?v=397"></script>

</body>
