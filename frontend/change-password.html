<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WAVESCOUT — Passwort ändern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #060F1F;
  --bg-1: #0A1628;
  --bg-2: #0F2240;
  --border-default: rgba(148, 175, 230, 0.14);
  --text-primary: #E8EEFB;
  --text-secondary: #94A8CC;
  --text-tertiary: #5E739B;
  --blue-500: #3B82F6;
  --blue-600: #2563EB;
  --font-sans: 'Geist', sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  background: radial-gradient(1200px 800px at 50% -10%, rgba(59,130,246,0.08), transparent 60%), var(--bg-1);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--border-default);
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

.title {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.input {
  width: 100%;
  background: var(--bg-0);
  border: 1px solid var(--border-default);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 14px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  transition: all 0.2s;
}

.input:focus {
  outline: none;
  border-color: var(--blue-500);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.btn {
  width: 100%;
  background: linear-gradient(180deg, var(--blue-500), var(--blue-600));
  border: 1px solid var(--blue-500);
  border-radius: 8px;
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-sans);
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(59,130,246,0.4);
}

.error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  color: #FCA5A5;
  margin-bottom: 20px;
  display: none;
}

.error.show {
  display: block;
}

.hint {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 6px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1 class="title">Passwort ändern</h1>
    <p class="subtitle">Bitte wähle ein neues, sicheres Passwort.</p>

    <div id="errorMessage" class="error"></div>

    <form id="changePasswordForm">
      <div class="form-group">
        <label>Neues Passwort</label>
        <input 
          type="password" 
          class="input" 
          id="newPassword" 
          placeholder="Mindestens 8 Zeichen"
          required
          minlength="8"
        />
        <div class="hint">Mindestens 8 Zeichen, sicher und einzigartig</div>
      </div>

      <div class="form-group">
        <label>Passwort bestätigen</label>
        <input 
          type="password" 
          class="input" 
          id="confirmPassword" 
          placeholder="Wiederhole das neue Passwort"
          required
          minlength="8"
        />
      </div>

      <button type="submit" class="btn" id="changeBtn">
        Passwort ändern
      </button>
    </form>
  </div>
</div>

<script>
const API_URL = 'https://tradingview-bot.spnn08.workers.dev';

// Session is validated server-side via HttpOnly cookie.

const form = document.getElementById('changePasswordForm');
const changeBtn = document.getElementById('changeBtn');
const errorMessage = document.getElementById('errorMessage');
const newPasswordInput = document.getElementById('newPassword');
const confirmPasswordInput = document.getElementById('confirmPassword');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const newPassword = newPasswordInput.value;
  const confirmPassword = confirmPasswordInput.value;

  if (newPassword !== confirmPassword) {
    showError('Passwörter stimmen nicht überein');
    return;
  }

  if (newPassword.length < 8) {
    showError('Passwort muss mindestens 8 Zeichen lang sein');
    return;
  }

  changeBtn.disabled = true;
  changeBtn.textContent = 'Speichere...';
  errorMessage.classList.remove('show');

  try {
    const response = await fetch(`${API_URL}/auth/change-password`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ newPassword })
    });

    const data = await response.json();

    if (data.success) {
      // Update user data
      const user = JSON.parse(localStorage.getItem('wavescout_user'));
      user.mustChangePassword = false;
      localStorage.setItem('wavescout_user', JSON.stringify(user));

      // Redirect to dashboard
      window.location.href = 'index.html';
    } else {
      showError(data.error || 'Fehler beim Ändern des Passworts');
    }
  } catch (error) {
    console.error('Change password error:', error);
    showError('Verbindung zum Server fehlgeschlagen');
  } finally {
    changeBtn.disabled = false;
    changeBtn.textContent = 'Passwort ändern';
  }
});

function showError(message) {
  errorMessage.textContent = message;
  errorMessage.classList.add('show');
}
</script>

</body>
</html>
